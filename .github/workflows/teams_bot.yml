name: Teams Morning Bot

# Primary: cron-job.org at 08:00 Taipei Mon–Fri (workflow_dispatch).
# Backup: GitHub schedule at 09:00 Taipei — skips if cron-job already sent today.
# See docs/cloud_schedule.md
on:
  workflow_dispatch:
    inputs:
      force_message_type:
        description: "Force message type (empty = normal schedule)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - ai
          - article
          - interaction
          - static
          - management
          - philosophy
      skip_workday_check:
        description: "Skip workday/holiday check (testing only)"
        required: false
        default: false
        type: boolean
  schedule:
    # UTC 01:00 = Taipei 09:00 Mon–Fri (backup if cron-job.org missed 08:00)
    - cron: "0 1 * * 1-5"

jobs:
  send-morning-message:
    runs-on: ubuntu-latest
    steps:
      - name: Set Taipei date
        id: date
        run: echo "today=$(TZ=Asia/Taipei date +%F)" >> $GITHUB_OUTPUT

      - name: Check if already sent today
        id: sent-cache
        uses: actions/cache@v4
        with:
          path: .morning-sent-marker
          key: morning-sent-${{ steps.date.outputs.today }}

      - name: Decide whether to send
        id: should-send
        env:
          CACHE_HIT: ${{ steps.sent-cache.outputs.cache-hit }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_TYPE: ${{ github.event.inputs.force_message_type }}
        run: |
          if [ "$CACHE_HIT" = "true" ] && [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$FORCE_TYPE" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "Force message type requested — sending despite cache."
          elif [ "$CACHE_HIT" = "true" ]; then
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "Morning message already sent today (${{ steps.date.outputs.today }}) — skipping."
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.should-send.outputs.send == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.should-send.outputs.send == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.should-send.outputs.send == 'true'
        run: pip install -r requirements.txt

      - name: Check Telegram configuration
        if: steps.should-send.outputs.send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          ENABLE_TELEGRAM: ${{ vars.ENABLE_TELEGRAM || 'true' }}
        run: python scripts/verify_telegram.py

      - name: Send morning message to Teams
        if: steps.should-send.outputs.send == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          MESSAGE_MODE: ${{ vars.MESSAGE_MODE || 'mixed' }}
          MESSAGE_STRATEGY: ${{ vars.MESSAGE_STRATEGY || 'random' }}
          AI_SCHEDULE_STRATEGY: ${{ vars.AI_SCHEDULE_STRATEGY || 'weekly' }}
          AI_WORKDAY_INTERVAL: ${{ vars.AI_WORKDAY_INTERVAL || '10' }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ENABLE_IMAGES: ${{ vars.ENABLE_IMAGES || 'true' }}
          ENABLE_MAJOR_NEWS: ${{ vars.ENABLE_MAJOR_NEWS || 'true' }}
          MAJOR_NEWS_THRESHOLD: ${{ vars.MAJOR_NEWS_THRESHOLD || '70' }}
          TEAMS_WEBHOOK_FORMAT: ${{ vars.TEAMS_WEBHOOK_FORMAT || 'auto' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          ENABLE_TELEGRAM: ${{ vars.ENABLE_TELEGRAM || 'true' }}
          MANAGEMENT_QUOTE_WEEKDAY: ${{ vars.MANAGEMENT_QUOTE_WEEKDAY || '2' }}
          INTERACTION_FORMS_URL: ${{ vars.INTERACTION_FORMS_URL || '' }}
          FORCE_MESSAGE_TYPE: ${{ github.event.inputs.force_message_type || '' }}
          SKIP_WORKDAY_CHECK: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.skip_workday_check == true || github.event.inputs.skip_workday_check == 'true') && 'true' || '' }}
        run: python main.py

      - name: Mark sent today
        if: steps.should-send.outputs.send == 'true' && success()
        run: mkdir -p .morning-sent-marker && touch .morning-sent-marker/sent

      - name: Save sent marker
        if: steps.should-send.outputs.send == 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .morning-sent-marker
          key: morning-sent-${{ steps.date.outputs.today }}
