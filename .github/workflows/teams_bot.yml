name: Teams Morning Bot

# Primary: cron-job.org at 08:00 Taipei Mon–Fri (workflow_dispatch).
# Backup: GitHub schedule at 09:00 Taipei — skips if a successful run already exists today.
# See docs/cloud_schedule.md
on:
  workflow_dispatch:
    inputs:
      force_message_type:
        description: "Force message type (empty = normal schedule)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - ai
          - article
          - interaction
          - static
          - management
          - philosophy
      skip_workday_check:
        description: "Skip workday/holiday check (testing only)"
        required: false
        default: false
        type: boolean
  schedule:
    # UTC 01:00 = Taipei 09:00 Mon–Fri (backup if cron-job.org missed 08:00)
    - cron: "0 1 * * 1-5"

permissions:
  actions: read
  contents: read

jobs:
  send-morning-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if already sent today
        id: dedup
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FORCE_MESSAGE_TYPE: ${{ github.event.inputs.force_message_type || '' }}
        run: python3 scripts/check_already_sent_today.py

      - name: Set up Python
        if: steps.dedup.outputs.send == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.dedup.outputs.send == 'true'
        run: pip install -r requirements.txt

      - name: Check Telegram configuration
        if: steps.dedup.outputs.send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          ENABLE_TELEGRAM: ${{ vars.ENABLE_TELEGRAM || 'true' }}
        run: python scripts/verify_telegram.py

      - name: Send morning message to Teams
        if: steps.dedup.outputs.send == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          MESSAGE_MODE: ${{ vars.MESSAGE_MODE || 'mixed' }}
          MESSAGE_STRATEGY: ${{ vars.MESSAGE_STRATEGY || 'random' }}
          AI_SCHEDULE_STRATEGY: ${{ vars.AI_SCHEDULE_STRATEGY || 'weekly' }}
          AI_WORKDAY_INTERVAL: ${{ vars.AI_WORKDAY_INTERVAL || '10' }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ENABLE_IMAGES: ${{ vars.ENABLE_IMAGES || 'true' }}
          ENABLE_MAJOR_NEWS: ${{ vars.ENABLE_MAJOR_NEWS || 'true' }}
          MAJOR_NEWS_THRESHOLD: ${{ vars.MAJOR_NEWS_THRESHOLD || '70' }}
          TEAMS_WEBHOOK_FORMAT: ${{ vars.TEAMS_WEBHOOK_FORMAT || 'auto' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          ENABLE_TELEGRAM: ${{ vars.ENABLE_TELEGRAM || 'true' }}
          MANAGEMENT_QUOTE_WEEKDAY: ${{ vars.MANAGEMENT_QUOTE_WEEKDAY || '2' }}
          INTERACTION_FORMS_URL: ${{ vars.INTERACTION_FORMS_URL || '' }}
          FORCE_MESSAGE_TYPE: ${{ github.event.inputs.force_message_type || '' }}
          SKIP_WORKDAY_CHECK: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.skip_workday_check == true || github.event.inputs.skip_workday_check == 'true') && 'true' || '' }}
        run: python main.py
